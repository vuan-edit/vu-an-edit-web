<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo_brand.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 - Trang không tồn tại | Vũ An Edit</title>
    <meta name="robots" content="noindex" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #000;
        color: #fff;
        font-family: 'Averta', -apple-system, BlinkMacSystemFont, sans-serif;
        text-align: center;
        padding: 2rem;
      }
      h1 {
        font-size: clamp(5rem, 15vw, 12rem);
        font-weight: 900;
        color: #b4fd00;
        line-height: 1;
        letter-spacing: -0.05em;
      }
      p { font-size: 1.1rem; color: #888; margin: 1rem 0 2.5rem; }
      a {
        display: inline-block;
        padding: 0.8rem 2rem;
        background: #b4fd00;
        color: #000;
        font-weight: 800;
        text-decoration: none;
        font-size: 0.85rem;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        transition: transform 0.2s, box-shadow 0.2s;
      }
      a:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 30px rgba(180, 253, 0, 0.3);
      }
    </style>
  </head>
  <body>
    <h1>404</h1>
    <p>Trang bạn tìm không tồn tại hoặc đã bị xóa.</p>
    <a href="/">← Về trang chủ</a>
  </body>
</html>
